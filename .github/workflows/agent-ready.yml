name: AgentReady

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  agent-ready:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node dist/cli.js check --format markdown --warn-only >> "$GITHUB_STEP_SUMMARY"
