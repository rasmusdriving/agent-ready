name: Bug report
description: Report something AgentReady detected or generated incorrectly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include the command, package manager, relevant docs, and expected result.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AgentReady version
      placeholder: 0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node.js version, OS, package manager, and repo type.
