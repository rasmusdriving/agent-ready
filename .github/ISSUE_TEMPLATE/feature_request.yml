name: Feature request
description: Suggest a maintainer workflow AgentReady should support.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Maintainer problem
      description: What repeated contributor or agent-readiness problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should AgentReady detect, generate, or validate?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any simpler workaround or adjacent tool?
